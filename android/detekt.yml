build:
  maxIssues: 0

complexity:
  LongMethod:
    threshold: 200
  LongParameterList:
    active: false
  TooManyFunctions:
    active: false
  CyclomaticComplexMethod:
    threshold: 30
  NestedBlockDepth:
    threshold: 5

style:
  MagicNumber:
    active: false
  MaxLineLength:
    maxLineLength: 140
  WildcardImport:
    active: false
  UnusedPrivateMember:
    active: true
    allowedNames: "(_|ignored|expected)"
  ReturnCount:
    active: false

naming:
  FunctionNaming:
    functionPattern: "[a-zA-Z][a-zA-Z0-9]*"
  TopLevelPropertyNaming:
    constantPattern: "[A-Za-z][_A-Za-z0-9]*"
