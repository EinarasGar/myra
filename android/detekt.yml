build:
  maxIssues: 0

complexity:
  LongMethod:
    threshold: 120
  LongParameterList:
    functionThreshold: 10
    constructorThreshold: 10
  TooManyFunctions:
    active: false
  CyclomaticComplexMethod:
    threshold: 20

style:
  MagicNumber:
    active: false
  MaxLineLength:
    maxLineLength: 140
  WildcardImport:
    active: false
  UnusedPrivateMember:
    active: true
    allowedNames: "(_|ignored|expected)"

naming:
  FunctionNaming:
    functionPattern: "[a-zA-Z][a-zA-Z0-9]*"
  TopLevelPropertyNaming:
    constantPattern: "[A-Za-z][_A-Za-z0-9]*"
